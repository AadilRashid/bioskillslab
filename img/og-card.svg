<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- DNA icon area -->
  <text x="100" y="220" font-family="Arial,sans-serif" font-size="80" fill="#38bdf8">🧬</text>
  <!-- Title -->
  <text x="100" y="310" font-family="Arial,Helvetica,sans-serif" font-size="64" font-weight="800" fill="#e2e8f0">BioSkills Lab</text>
  <!-- Subtitle -->
  <text x="100" y="380" font-family="Arial,Helvetica,sans-serif" font-size="32" fill="#94a3b8">Learn Bioinformatics From Scratch</text>
  <!-- Features -->
  <text x="100" y="450" font-family="Arial,Helvetica,sans-serif" font-size="22" fill="#64748b">14 Chapters · Interactive Terminal · 150+ Quizzes · Self-Paced · Free</text>
  <!-- Tags -->
  <rect x="100" y="490" width="80" height="32" rx="16" fill="rgba(56,189,248,0.15)"/>
  <text x="118" y="512" font-family="Arial,sans-serif" font-size="16" fill="#38bdf8">Unix</text>
  <rect x="195" y="490" width="100" height="32" rx="16" fill="rgba(167,139,250,0.15)"/>
  <text x="213" y="512" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">Python</text>
  <rect x="310" y="490" width="50" height="32" rx="16" fill="rgba(167,139,250,0.15)"/>
  <text x="322" y="512" font-family="Arial,sans-serif" font-size="16" fill="#a78bfa">R</text>
  <rect x="375" y="490" width="110" height="32" rx="16" fill="rgba(74,222,128,0.15)"/>
  <text x="393" y="512" font-family="Arial,sans-serif" font-size="16" fill="#4ade80">RNA-Seq</text>
  <rect x="500" y="490" width="90" height="32" rx="16" fill="rgba(74,222,128,0.15)"/>
  <text x="515" y="512" font-family="Arial,sans-serif" font-size="16" fill="#4ade80">GATK</text>
  <rect x="605" y="490" width="120" height="32" rx="16" fill="rgba(251,146,60,0.15)"/>
  <text x="620" y="512" font-family="Arial,sans-serif" font-size="16" fill="#fb923c">samtools</text>
  <rect x="740" y="490" width="120" height="32" rx="16" fill="rgba(251,146,60,0.15)"/>
  <text x="755" y="512" font-family="Arial,sans-serif" font-size="16" fill="#fb923c">BEDTools</text>
  <!-- Terminal mockup on right -->
  <rect x="750" y="120" width="380" height="250" rx="12" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <circle cx="772" cy="142" r="6" fill="#f87171"/>
  <circle cx="792" cy="142" r="6" fill="#fbbf24"/>
  <circle cx="812" cy="142" r="6" fill="#4ade80"/>
  <text x="770" y="185" font-family="monospace" font-size="14" fill="#4ade80">$ grep -c ">" seqs.fasta</text>
  <text x="770" y="210" font-family="monospace" font-size="14" fill="#c9d1d9">5</text>
  <text x="770" y="240" font-family="monospace" font-size="14" fill="#4ade80">$ awk 'NR%4==2' reads.fastq</text>
  <text x="770" y="265" font-family="monospace" font-size="14" fill="#c9d1d9">ATCGATCGATCGATCG...</text>
  <text x="770" y="295" font-family="monospace" font-size="14" fill="#4ade80">$ samtools view -c -F 4 s.bam</text>
  <text x="770" y="320" font-family="monospace" font-size="14" fill="#c9d1d9">1284567</text>
  <text x="770" y="350" font-family="monospace" font-size="14" fill="#4ade80">$ _</text>
  <!-- URL -->
  <text x="100" y="580" font-family="Arial,sans-serif" font-size="20" fill="#38bdf8">bioskillslab.dev</text>
